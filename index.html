<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Sales Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="top-bar">
            <div class="top-bar-row">
                <div class="logo">
                    <h1>Visual Sales <span>Navigator</span></h1>
                </div>
                <div class="filter-group year-group">
                    <label for="year-filter">Año:</label>
                    <select id="year-filter">
                        <option value="All">Todos</option>
                    </select>
                </div>
            </div>

            <div class="filters-main">
                <div class="filter-group half-width">
                    <label for="category-filter">Categoría:</label>
                    <select id="category-filter">
                        <option value="All">Todas</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Office Supplies">Office Supplies</option>
                        <option value="Technology">Technology</option>
                    </select>
                </div>

                <div class="filter-group half-width">
                    <label for="state-filter">Estado:</label>
                    <input type="search" list="state-list" id="state-filter" placeholder="🔍 Escribe..." class="search-input" autocomplete="off">
                    <datalist id="state-list"></datalist>
                </div>
                
                <div class="filter-actions">
                    <button id="reset-btn" class="btn-reset">🔄 Reiniciar</button>
                    <button id="theme-toggle" class="btn-theme">☀️</button>
                </div>
            </div>
        </header>

        <section class="kpi-container">
            <div class="kpi-card">
                <p>Ventas Totales</p>
                <h3 id="kpi-sales">$0</h3>
            </div>
            <div class="kpi-card">
                <p>Transacciones</p>
                <h3 id="kpi-orders">0</h3>
            </div>
            <div class="kpi-card">
                <p>Ticket Promedio</p>
                <h3 id="kpi-aov">$0</h3>
            </div>
            <div class="kpi-card">
                <p>Estado Principal</p>
                <h3 id="kpi-state">-</h3>
            </div>
            <div class="kpi-card">
                <p>Categoría Top</p>
                <h3 id="kpi-category">-</h3>
            </div>
            <div class="kpi-card">
                <p>Sub-Categoría Top</p>
                <h3 id="kpi-subcategory">-</h3>
            </div>
            <div class="kpi-card">
                <p>Segmento Principal</p>
                <h3 id="kpi-segment">-</h3>
            </div>
            <div class="kpi-card">
                <p>Envío Frecuente</p>
                <h3 id="kpi-ship">-</h3>
            </div>
        </section>

        <main class="grid-layout">

            <section class="card map-card">
                <h2>Distribución Geográfica</h2>
                <div id="map-container" style="position: relative; width: 100%; height: 480px;">
                    <div id="map" style="width: 100%; height: 100%;"></div>
                    <div id="map-legend" style="position: absolute; bottom: 5px; right: 5px; background: rgba(21, 26, 34, 0.8); padding: 8px; border-radius: 8px; border: 1px solid #2A3143; backdrop-filter: blur(4px);"></div>
                </div>
            </section>

            <section class="charts-column">
                <div class="card trend-card">
                    <h2 id="trend-title">Tendencia de Ventas (Nacional)</h2>
                    <div id="linechart"></div>
                </div>
                
                <div class="card bar-card">
                    <h2 id="bar-title">Top Sub-Categorías (Nacional)</h2>
                    <div id="barchart"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="tooltip" class="tooltip" style="opacity: 0;"></div>
    
    <script src="main.js"></script>
</body>
</html>
